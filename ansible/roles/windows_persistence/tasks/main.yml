---
- name: Detect Windows user profile (via interop)
  ansible.builtin.shell:
    cmd: "wslpath \"$(cmd.exe /c 'echo %USERPROFILE%' 2>/dev/null | tr -d '\\r')\""
  register: winprofile
  changed_when: false

- name: Ensure C:\Temp exists
  ansible.builtin.file:
    path: /mnt/c/Temp
    state: directory

- name: Ensure .pihole dir in the Windows profile
  ansible.builtin.file:
    path: "{{ winprofile.stdout }}/.pihole"
    state: directory

- name: Stage set-dns.ps1 into the Windows profile
  ansible.builtin.copy:
    src: "{{ repo_dir }}/windows/set-dns.ps1"
    dest: "{{ winprofile.stdout }}/.pihole/set-dns.ps1"

- name: Stage mktask.ps1 into C:\Temp
  ansible.builtin.copy:
    src: "{{ repo_dir }}/windows/mktask.ps1"
    dest: /mnt/c/Temp/mktask.ps1

- name: Ensure C:\SafeHouse working dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - /mnt/c/SafeHouse/windows
    - /mnt/c/SafeHouse/blocklists
    - /mnt/c/SafeHouse/logs

- name: Deploy the connection-layer ad blocker toolkit to C:\SafeHouse
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: "{{ repo_dir }}/windows/safehouse-adblock.ps1", dest: /mnt/c/SafeHouse/windows/safehouse-adblock.ps1 }
    - { src: "{{ repo_dir }}/blocklists/ad-ip-ranges.txt",   dest: /mnt/c/SafeHouse/blocklists/ad-ip-ranges.txt }
    - { src: "{{ repo_dir }}/blocklists/ad-watchlist.txt",   dest: /mnt/c/SafeHouse/blocklists/ad-watchlist.txt }

- name: Remaining ADMIN steps (cannot self-elevate from WSL)
  ansible.builtin.debug:
    msg:
      - "Pi-hole is up. One-time ADMIN steps remain (elevated PowerShell):"
      - "1) Point DNS:      Set-DnsClientServerAddress -InterfaceAlias 'Ethernet' -ServerAddresses <WSL-eth0-IP>"
      - "2) Arm logon task: powershell -ExecutionPolicy Bypass -File C:\\Temp\\mktask.ps1"
      - "3) Arm firewall:   powershell -ExecutionPolicy Bypass -File C:\\SafeHouse\\windows\\safehouse-adblock.ps1  (with ads showing)"
      - "Then RESTART Google Play Games so the crosvm VM picks up Pi-hole. See windows/README.md."
