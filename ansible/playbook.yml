---
# SafeHouse — deploy the Pi-hole ad-block stack on this WSL2 machine.
# Run:  ansible-playbook -i inventory.ini playbook.yml
#
# Linux/WSL/Pi-hole side is fully automated. The two Windows admin steps
# (point DNS + arm the logon task) need UAC and are printed at the end.
- name: SafeHouse Pi-hole stack
  hosts: local
  connection: local
  gather_facts: true
  vars:
    repo_dir: "{{ playbook_dir | dirname }}"
  roles:
    - prereqs
    - pihole
    - tools
    - windows_persistence
